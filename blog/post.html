<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post — Edvard Appelberg</title>
  <link rel="icon" href="/italy26/assets/images/flagit.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
  <link rel="stylesheet" href="/italy26/static/css/style.css">
  <link rel="canonical" href="https://biketoured.github.io/italy26/index.html">
  <script src="/italy26/static/js/main.js" defer></script>
  <style>
    body { background: var(--stone); color: var(--text); min-height: 100vh; }

    /* 2. Italian flag banner — always shown, full width */
    .post-cover-banner {
      width: 100%; height: 340px; object-fit: cover; display: block;
    }

    /* 3–5. Post content wrapper */
    .post-wrapper { max-width: 780px; margin: 0 auto; padding: 3rem 2rem 6rem; }

    .back-link { display: inline-flex; align-items: center; gap: 0.4rem; font-family: 'DM Mono', monospace; font-size: 1rem; letter-spacing: 0.12em; padding: 10px 30px; text-transform: uppercase; color: var(--gray-light); background: var(--green); text-decoration: none; margin-bottom: 2.5rem; transition: color 0.2s; }
    .back-link:hover { background-color: var(--green-light); }
    .post-header { border-bottom: 2px solid var(--text-muted); padding-bottom: 1.5rem; margin-bottom: 2.5rem; }
    .post-badge { display: inline-block; font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase; padding: 3px 10px; margin-bottom: 0.75rem; }
    .post-badge.journal { background: var(--green); color: var(--green-light); }
    .post-badge.blog    { background: var(--red);   color: var(--white); }
    .post-title { font-family: 'Playfair Display', serif; font-size: clamp(1.8rem, 4vw, 2.8rem); color: var(--green); font-weight: 400; line-height: 1.15; margin-bottom: 0.75rem; }
    .post-meta  { font-family: 'DM Mono', monospace; font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--stone-dark); }

    /* 4. Uploaded cover photo — between header and text */
    .post-cover-photo { margin: 0 0 2rem; }
    .post-cover-photo img { width: 100%; max-height: 480px; object-fit: cover; display: block; }

    /* 5. Journal sections */
    .journal-section { margin-bottom: 2rem; padding-left: 1rem; border-left: 3px solid var(--stone-dark); }
    .journal-section-label { font-family: 'DM Mono', monospace; font-size: 0.8rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--stone-dark); margin-bottom: 0.5rem; }
    .journal-section-body { font-size: 1rem; line-height: 1.75; color: var(--text); }

    /* Blog prose */
    .blog-prose { font-size: 1.05rem; line-height: 1.8; color: var(--text); }
    .blog-prose p      { margin-bottom: 1.2rem; color: var(--text-muted);}
    .blog-prose h2     { font-family: 'Playfair Display', serif; font-size: 1.6rem; color: var(--green); margin: 2rem 0 0.75rem; font-weight: 400; }
    .blog-prose h3     { font-family: 'Playfair Display', serif; font-size: 1.25rem; color: var(--green); margin: 1.5rem 0 0.5rem; font-weight: 400; }
    .blog-prose strong { color: var(--green); font-weight: 700; }
    .blog-prose em     { color: var(--red-warm); }
    .blog-prose ul, .blog-prose ol { margin: 0.75rem 0 1.2rem 1.5rem; }
    .blog-prose li     { margin-bottom: 0.4rem; line-height: 1.7; }
    .blog-prose blockquote { border-left: 3px solid var(--red); padding-left: 1rem; color: var(--text-muted); font-style: italic; margin: 1.5rem 0; }

    /* Inline photos [photo:N] */
    .post-inline-photo { margin: 2rem 0; }
    .post-inline-photo img { width: 100%; max-height: 520px; object-fit: cover; display: block; }
    .post-inline-photo figcaption {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      font-style: italic;
      margin-top: 0.5rem;
      line-height: 1.5;
    }

    .loading-state, .error-state { text-align: center; padding: 4rem 2rem; font-family: 'DM Mono', monospace; font-size: 0.8rem; letter-spacing: 0.1em; color: var(--text-muted); }

    @media (max-width: 600px) {
      .post-cover-banner { height: 220px; }
      .post-wrapper { padding: 2rem 1.25rem 4rem; }
    }
  </style>
</head>

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-G4WXL40L9E"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-G4WXL40L9E');
</script>

<body>

  <!-- 1. Nav -->
  <nav id="shared-nav"></nav>

  <!-- 2. Italian flag banner — always placehold.png -->
  <img class="post-cover-banner" src="/italy26/assets/images/placehold.png" alt="Italy 2026">

  <!-- 3–5. Post content injected by JS -->
  <div class="post-wrapper" id="post-wrapper">
    <div class="loading-state">Loading post...</div>
  </div>

  <footer id="shared-footer"></footer>

  <script>
    const PLACEHOLDER = '/italy26/assets/images/placehold.png';

    document.addEventListener('langchange', loadPost);

    function getSlug() {
      return new URLSearchParams(window.location.search).get('slug');
    }

    function parseFrontmatter(raw) {
      const n = raw.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
      const m = n.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);
      if (!m) return { meta: {}, body: n };
      try { return { meta: jsyaml.load(m[1]), body: m[2].trim() }; }
      catch(e) { return { meta: {}, body: n }; }
    }

    function formatDate(dateStr, lang) {
      const d = new Date(dateStr);
      const locales = { en: 'en-GB', sv: 'sv-SE', it: 'it-IT' };
      return d.toLocaleDateString(locales[lang] || 'en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
    }

    function renderJournal(body, captions, slug) {
      return body.split(/^## /m).filter(Boolean).map(function(part) {
        var lines   = part.trim().split('\n');
        var heading = lines[0].trim();
        var content = lines.slice(1).join('\n').trim();
        // Replace [photo:N] inside journal sections too
        content = content.replace(/\[photo:(\d+)\]/g, function(match, num) {
          var n       = parseInt(num);
          var src     = '/italy26/blog/posts/' + slug + '/photo' + n + '.jpg';
          var caption = (captions && captions['photo' + n]) || '';
          var cap     = caption ? '<figcaption>' + caption + '</figcaption>' : '';
          return '<figure class="post-inline-photo">'
            + '<img src="' + src + '" alt="' + caption + '"'
            + ' onerror="this.onerror=null;this.style.display=\'none\';this.nextElementSibling&&(this.nextElementSibling.style.display=\'none\')">'
            + cap
            + '</figure>';
        });
        return '<div class="journal-section">'
          + '<p class="journal-section-label">' + heading + '</p>'
          + '<div class="journal-section-body">' + marked.parse(content) + '</div>'
          + '</div>';
      }).join('');
    }

    function renderBlog(body, captions, slug) {
      // Replace [photo:N] tags with actual images
      var html = body.replace(/\[photo:(\d+)\]/g, function(match, num) {
        var n       = parseInt(num);
        var src     = '/italy26/blog/posts/' + slug + '/photo' + n + '.jpg';
        var caption = (captions && captions['photo' + n]) || '';
        var cap     = caption ? '<figcaption>' + caption + '</figcaption>' : '';
        return '<figure class="post-inline-photo">'
          + '<img src="' + src + '" alt="' + caption + '"'
          + ' onerror="this.onerror=null;this.style.display=\'none\';this.nextElementSibling&&(this.nextElementSibling.style.display=\'none\')">'
          + cap
          + '</figure>';
      });
      return '<div class="blog-prose">' + marked.parse(html) + '</div>';
    }

    const backLabels = {
      journal: { en: '← Back to Journal', sv: '← Tillbaka till dagboken', it: '← Torna al diario' },
      blog:    { en: '← Back to Blog',    sv: '← Tillbaka till bloggen',  it: '← Torna al blog'  }
    };

    function loadPost() {
      const slug = getSlug();
      if (!slug) {
        document.getElementById('post-wrapper').innerHTML = '<div class="error-state">No post specified.</div>';
        return;
      }

      const lang = (typeof currentLang !== 'undefined' ? currentLang : null)
                || localStorage.getItem('preferred-lang') || 'en';

      const tryFetch = function(l) {
        return fetch('/italy26/blog/posts/' + slug + '/' + l + '.md').then(function(r) {
          if (!r.ok) throw new Error('not found');
          return r.text();
        });
      };

      tryFetch(lang).catch(function() { return tryFetch('en'); }).then(function(raw) {
        if (!raw) throw new Error('empty');

        var parsed = parseFrontmatter(raw);
        var meta = parsed.meta;
        var body = parsed.body;
        if (!meta.type) throw new Error('parse failed');

        var type      = meta.type || 'blog';
        var title     = meta.title ? (meta.title[lang] || meta.title.en || slug) : slug;
        var backLabel = (backLabels[type] && backLabels[type][lang]) || backLabels[type]['en'];
        var badgeText = type === 'journal'
          ? ({en:'Day',sv:'Dag',it:'Giorno'}[lang] + ' ' + meta.day)
          : meta.tag;
        var metaParts = [formatDate(meta.date, lang)];
        if (type === 'journal') {
          if (meta.km)        metaParts.push(meta.km + ' km');
          if (meta.elevation) metaParts.push(meta.elevation + ' m \u2191');
        }

        // 4. Cover photo — probe jpg/jpeg/png, hide if none found
        var coverUrl = '/italy26/blog/posts/' + slug + '/cover.jpg';
        var coverHTML = '<div class="post-cover-photo">'
          + '<img id="post-photo" src="' + coverUrl + '" alt="' + title + '">'
          + '</div>';

        document.title = title + ' — Edvard A';
        document.getElementById('post-wrapper').innerHTML =
          '<a href="index.html?tab=' + type + '" class="back-link">' + backLabel + '</a>'
          + '<div class="post-header">'
          +   '<span class="post-badge ' + type + '">' + badgeText + '</span>'
          +   '<h1 class="post-title">' + title + '</h1>'
          +   '<p class="post-meta">' + metaParts.join(' · ') + '</p>'
          + '</div>'
          + coverHTML
          + (type === 'journal'
              ? renderJournal(body, meta.captions, slug)
              : renderBlog(body, meta.captions, slug));

        // Cascade through extensions, hide if none exist
        var photo = document.getElementById('post-photo');
        if (photo) {
          var tries = ['cover.jpeg', 'cover.png'];
          var idx = 0;
          photo.onerror = function() {
            if (idx < tries.length) {
              photo.src = '/italy26/blog/posts/' + slug + '/' + tries[idx++];
            } else {
              photo.onerror = null;
              photo.style.display = 'none';
            }
          };
        }

      }).catch(function(err) {
        document.getElementById('post-wrapper').innerHTML =
          '<div class="error-state">Post not found.<br><small>' + err.message + '</small></div>';
      });
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', loadPost);
    } else {
      loadPost();
    }
  </script>
</body>
</html>
