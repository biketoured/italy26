<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog — Edvard Appelberg</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="../manuals.js"></script>
  <link rel="stylesheet" href="/italy26/static/css/style.css">
  <script src="/italy26/static/js/main.js" defer></script>
  <style>
    body { font-family: 'DM Sans', sans-serif; background: var(--stone); color: var(--text); min-height: 100vh; }

    .page-header { padding: 8rem 3rem 2rem; max-width: 1200px; margin: 0 auto; }
    .page-header .section-tag { font-family: 'DM Mono', monospace; font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--red); margin-bottom: 0.75rem; }
    .page-header h1 { font-family: 'Playfair Display', serif; font-size: clamp(2.5rem, 5vw, 4rem); color: var(--green); font-weight: 400; line-height: 1.1; }

    .tabs-wrapper { max-width: 1200px; margin: 2rem auto 0; padding: 0 3rem; border-bottom: 2px solid var(--stone-dark); display: flex; }
    .tab-btn { background: none; border: none; cursor: pointer; font-family: 'DM Mono', monospace; font-size: 0.75rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--stone-dark); padding: 0.75rem 1.5rem; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: color 0.2s; }
    .tab-btn:hover { color: var(--green); }
    .tab-btn.active { background: var(--green); color: var(--stone); border-bottom-color: var(--green); }

    .posts-container { max-width: 1200px; margin: 2.5rem auto; padding: 0 3rem 6rem; }
    .posts-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }

    .post-card { background: var(--white); text-decoration: none; display: block; transition: transform 0.2s; border-top: 3px solid var(--red); }
    .post-card.type-blog { border-top-color: var(--yellow); }
    .post-card:hover { transform: translateY(-4px); }

    .post-card-cover { width: 100%; height: 160px; object-fit: cover; display: block; background: var(--green-mid); }
    .post-card-cover-placeholder { width: 100%; height: 160px; background: var(--green-mid); display: flex; align-items: center; justify-content: center; color: rgba(196,180,154,0.3); font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 0.1em; }
    .post-card-body { padding: 1.25rem; }
    .post-card-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.6rem; }
    .post-badge { font-family: 'DM Mono', monospace; font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase; padding: 2px 8px; }
    .post-badge.journal { background: var(--green); color: var(--green-light); }
    .post-badge.blog { background: var(--red); color: var(--white); }
    .post-card-date { font-family: 'DM Mono', monospace; font-size: 0.62rem; color: var(--stone-dark); letter-spacing: 0.05em; }
    .post-card-title { font-family: 'Playfair Display', serif; font-size: 1.05rem; color: var(--text); line-height: 1.4; margin-bottom: 0.5rem; font-weight: 400; }
    .post-card-stats { display: flex; gap: 1rem; margin-bottom: 0.6rem; }
    .post-card-stats span { font-size: 0.8rem; color: var(--text-muted); }
    .post-card-readtime { font-family: 'DM Mono', monospace; font-size: 0.6rem; letter-spacing: 0.08em; color: var(--stone-dark); text-transform: uppercase; }
    .empty-state { grid-column: 1 / -1; text-align: center; padding: 4rem 2rem; color: var(--text-muted); font-family: 'DM Mono', monospace; font-size: 0.8rem; letter-spacing: 0.1em; }

    @media (max-width: 900px) { .posts-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 600px) {
      .page-header { padding: 7rem 1.5rem 1.5rem; } .tabs-wrapper { padding: 0 1.5rem; }
      .posts-container { padding: 0 1.5rem 4rem; } .posts-grid { grid-template-columns: 1fr; }
    }

    /* ── WORD OF THE DAY ── */
    .word-strip {
      background: var(--green);
      padding: 1rem 3rem;
      display: flex;
      align-items: baseline;
      gap: 1.2rem;
      flex-wrap: wrap;
    }
    .word-strip.hidden { display: none; }
    .word-strip-word {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      font-style: italic;
      color: var(--yellow);
      white-space: nowrap;
    }
    .word-strip-sep {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      color: var(--stone-dark);
      letter-spacing: 0.1em;
    }
    .word-strip-meaning {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      color: var(--stone);
      font-weight: 300;
      line-height: 1.5;
    }
    .word-strip-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--stone-dark);
      white-space: nowrap;
      margin-left: auto;
      padding-left: 1rem;
    }
    @media (max-width: 768px) {
      .word-strip { padding: 0.9rem 1.5rem; gap: 0.75rem; }
      .word-strip-label { margin-left: 0; }
    }
  </style>
</head>

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-G4WXL40L9E"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-G4WXL40L9E');
</script>

<body>

  <!-- NAV -->
  <nav id="shared-nav"></nav>


  <!-- PAGE HEADER -->
  <div class="page-header">
    <p class="section-tag" data-en="// The blog" data-sv="// Bloggen" data-it="// Blog">// The journal</p>
    <h1 data-en="Blog &amp; Journal" data-sv="Blogg &amp; Dagbok" data-it="Blog &amp; Diario">Blog &amp; Journal</h1>
  </div>

  <!-- WORD OF THE DAY -->
  <div class="word-strip" id="word-strip">
    <span class="word-strip-word" id="word-strip-word"></span>
    <span class="word-strip-sep">—</span>
    <span class="word-strip-meaning" id="word-strip-meaning"></span>
    <span class="word-strip-label"
          data-en="Word of the day"
          data-sv="Dagens ord"
          data-it="Parola del giorno">Word of the day</span>
  </div>

  <!-- TABS -->
  <div class="tabs-wrapper">
    <button class="tab-btn active" data-tab="journal" data-en="Journal" data-sv="Dagbok" data-it="Diario">Journal</button>
    <button class="tab-btn" data-tab="blog" data-en="Blog" data-sv="Blogg" data-it="Blog">Blog</button>
  </div>

  <!-- POSTS GRID — filled by JS -->
  <div class="posts-container">
    <div class="posts-grid" id="posts-grid"></div>
  </div>

  <!-- FOOTER -->
  <footer id="shared-footer"></footer>

  <script>
    // Language handled by main.js — currentLang available globally

    let activeTab = 'journal';
    const tabBtns = document.querySelectorAll('.tab-btn');
    tabBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        activeTab = btn.getAttribute('data-tab');
        tabBtns.forEach(b => b.classList.toggle('active', b === btn));
        renderCards(activeTab);
      });
    });

    function readTime(post) { return post.type === 'journal' ? '3 min read' : '5 min read'; }

    function formatDate(dateStr, lang) {
      const d = new Date(dateStr);
      const locales = { en: 'en-GB', sv: 'sv-SE', it: 'it-IT' };
      return d.toLocaleDateString(locales[lang] || 'en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function renderCards(type) {
      const grid     = document.getElementById('posts-grid');
      const filtered = allPosts.filter(p => p.type === type);
      if (filtered.length === 0) {
        const labels = { en: 'No posts yet, check back soon.', sv: 'Inga inlägg ännu, kom tillbaka snart.', it: 'Nessun articolo ancora, torna presto.' };
        grid.innerHTML = `<div class="empty-state">${labels[currentLang]}</div>`;
        return;
      }
      grid.innerHTML = filtered.map(post => {
        const title     = post.title[currentLang] || post.title.en;
        const date      = formatDate(post.date, currentLang);
        const rt        = readTime(post);
        const coverSrc = '/italy26/blog/posts/' + post.slug + '/cover.jpg';
        const coverHTML = `<img class="post-card-cover"
          src="${coverSrc}"
          alt="${title}"
          loading="lazy"
          onerror="
            const t=['cover.jpeg','cover.png','cover.webp'];
            const i=parseInt(this.dataset.try||0);
            if(i<t.length){this.dataset.try=i+1;this.src='/italy26/blog/posts/${post.slug}/'+t[i];}
            else{this.onerror=null;this.src='/italy26/assets/images/placehold.png';}
          ">`;
        const badgeText = post.type === 'journal'
          ? ({ en: 'Day', sv: 'Dag', it: 'Giorno' }[currentLang] + ' ' + post.day)
          : post.tag;
        const badgeClass = post.type === 'journal' ? 'journal' : 'blog';
        const statsHTML  = post.type === 'journal'
          ? `<div class="post-card-stats"><span>${post.km} km</span><span>${post.elevation} m ↑</span></div>`
          : '';
        return `
          <a href="post.html?slug=${post.slug}" class="post-card type-${post.type}">
            ${coverHTML}
            <div class="post-card-body">
              <div class="post-card-meta">
                <span class="post-badge ${badgeClass}">${badgeText}</span>
                <span class="post-card-date">${date}</span>
              </div>
              <p class="post-card-title">${title}</p>
              ${statsHTML}
              <p class="post-card-readtime">${rt}</p>
            </div>
          </a>`;
      }).join('');
    }
    let allPosts = [];
    fetch('/italy26/blog/posts.json')
      .then(r => {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(data => {
        allPosts = data.sort((a, b) => new Date(b.date) - new Date(a.date));
        renderCards(activeTab);
      })
      .catch(err => {
        document.getElementById('posts-grid').innerHTML =
          `<div class="empty-state">Fetch failed: ${err.message}</div>`;
      });
  </script>  <script>
  // ── WORD OF THE DAY — reads WORD and MEANING from manuals.js ──
  (function() {
    const strip     = document.getElementById('word-strip');
    const wordEl    = document.getElementById('word-strip-word');
    const meaningEl = document.getElementById('word-strip-meaning');
    if (!strip) return;
    if (typeof WORD === 'undefined' || !WORD) {
      strip.classList.add('hidden');
      return;
    }
    wordEl.textContent    = WORD;
    meaningEl.textContent = MEANING || '';
  })();
  </script>

</body>
</html>
